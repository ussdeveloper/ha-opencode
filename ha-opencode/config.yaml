name: "OpenCode Terminal"
version: "0.1.5"
slug: "ha-opencode"
description: >-
  Web terminal with full dev toolchain, Docker CLI, and OpenCode AI.
  Full unrestricted host access – manage HA configuration, install/remove
  add-ons, access host processes and D-Bus, build custom local add-ons.
  Auto-starts OpenCode in a persistent tmux session.
url: "https://github.com/ussdeveloper/ha-opencode"
arch:
  - aarch64
  - amd64
  - armv7
  - armhf

# ── HA / Supervisor integration ──────────────────────────────
homeassistant_api: true
hassio_api: true
docker_api: true
host_network: true
host_pid: true
host_uts: true
host_ipc: true
host_dbus: true
apparmor: false
protected: false

# ── Ingress (sidebar panel) ──────────────────────────────────
ingress: true
ingress_port: 7681
panel_icon: mdi:console-line
panel_title: OpenCode
panel_admin: false

# ── Startup ──────────────────────────────────────────────────
startup: application
boot: auto
init: false

# ── Stage ────────────────────────────────────────────────────
stage: experimental

# ── Ports ────────────────────────────────────────────────────
ports:
  7681/tcp: null
ports_description:
  7681/tcp: "Web terminal (ttyd)"

# ── Mapped folders ───────────────────────────────────────────
map:
  - config:rw
  - ssl:ro
  - share:rw
  - backup:rw
  - media:rw
  - addons:rw

# ── Host devices ────────────────────────────────────────────
devices:
  - /dev/mem
  - /dev/tty

# ── Privileged access (full host capabilities) ─────────────
privileged:
  - SYS_ADMIN
  - SYS_PTRACE
  - NET_ADMIN
  - SYS_RAWIO
  - SYS_MODULE
  - SYS_NICE
  - SYS_RESOURCE
  - SYS_TIME

# ── Options (defaults) ───────────────────────────────────────
options:
  terminal_password: ""
  opencode_auto_start: true
  opencode_workspace: "/config"
  opencode_model: ""
  opencode_system_prompt: ""
  opencode_rules: ""
  opencode_instructions: ""

# ── Schema (validation) ──────────────────────────────────────
schema:
  terminal_password: "password?"
  opencode_auto_start: "bool"
  opencode_workspace: "str"
  opencode_model: "str?"
  opencode_system_prompt: "str?"
  opencode_rules: "str?"
  opencode_instructions: "str?"
