name: "OpenCode Terminal"
version: "0.1.1"
slug: "ha-opencode"
description: >-
  Web terminal with full dev toolchain, Docker CLI, and OpenCode AI.
  Access Home Assistant configuration, manage add-on containers via
  docker.sock, auto-start OpenCode in a persistent tmux session.
url: "https://github.com/ussdeveloper/ha-opencode"
arch:
  - aarch64
  - amd64
  - armv7
  - armhf

# ── HA / Supervisor integration ──────────────────────────────
homeassistant_api: true
hassio_api: true
docker_api: true
host_network: false
apparmor: false

# ── Ingress (sidebar panel) ──────────────────────────────────
ingress: true
ingress_port: 7681
panel_icon: mdi:console-line
panel_title: OpenCode
panel_admin: false

# ── Startup ──────────────────────────────────────────────────
startup: application
boot: auto
init: false

# ── Stage ────────────────────────────────────────────────────
stage: experimental

# ── Ports ────────────────────────────────────────────────────
ports:
  7681/tcp: null
ports_description:
  7681/tcp: "Web terminal (ttyd)"

# ── Mapped folders ───────────────────────────────────────────
map:
  - config:rw
  - ssl:ro
  - share:rw
  - backup:rw
  - media:rw
  - addons:ro

# ── Privileged access ────────────────────────────────────────
privileged:
  - SYS_PTRACE

# ── Options (defaults) ───────────────────────────────────────
options:
  terminal_password: ""
  opencode_auto_start: true
  opencode_workspace: "/config"
  opencode_model: ""

# ── Schema (validation) ──────────────────────────────────────
schema:
  terminal_password: "password?"
  opencode_auto_start: "bool"
  opencode_workspace: "str"
  opencode_model: "str?"
